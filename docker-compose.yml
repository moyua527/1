version: '3.8'

services:
  app:
    build: .
    ports:
      - "1800:1800"
    env_file:
      - server/duijie/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/server/duijie/uploads
      - logs:/app/server/duijie/logs
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-duijie_db}
      MYSQL_USER: ${DB_USER:-duijie}
      MYSQL_PASSWORD: ${DB_PASSWORD:-DuiJie@2024!}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./server/nginx/duijie.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/duijieReact/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:
  uploads:
  logs:
