<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DuiJie - 项目对接平台</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
    <script>
      // Runtime env config (injected by standalone server in production)
      try { document.write('<scr' + 'ipt src="/env-config.js"><\/scr' + 'ipt>') } catch(e) {}
    </script>
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-tertiary: #f1f5f9;
        --bg-card: #ffffff;
        --bg-hover: #f1f5f9;
        --bg-selected: #eff6ff;
        --bg-success: #f0fdf4;
        --bg-warning: #fffbeb;
        --bg-danger: #fef2f2;
        --bg-danger-hover: #fee2e2;
        --bg-warning-hover: #fef3c7;

        --text-heading: #0f172a;
        --text-primary: #1e293b;
        --text-body: #334155;
        --text-secondary: #64748b;
        --text-tertiary: #94a3b8;
        --text-disabled: #cbd5e1;
        --text-inverse: #ffffff;

        --border-primary: #e2e8f0;
        --border-secondary: #f1f5f9;
        --border-focus: #3b82f6;

        --brand: #2563eb;
        --brand-hover: #1d4ed8;
        --brand-light: #eff6ff;
        --brand-light-2: #dbeafe;
        --brand-border: #bfdbfe;

        --color-success: #16a34a;
        --color-warning: #d97706;
        --color-danger: #dc2626;
        --color-purple: #7c3aed;
        --color-orange: #ea580c;
        --color-amber: #f59e0b;
        --color-info: #0284c7;

        --bg-info: #e0f2fe;
        --bg-purple: #f5f3ff;
        --bg-purple-hover: #ede9fe;
        --bg-success-border: #bbf7d0;
        --bg-warning-border: #fde68a;
        --bg-danger-border: #fecaca;
      }
      [data-theme="dark"] {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-tertiary: #334155;
        --bg-card: #1e293b;
        --bg-hover: #334155;
        --bg-selected: #1e3a5f;
        --bg-success: #052e16;
        --bg-warning: #451a03;
        --bg-danger: #450a0a;
        --bg-danger-hover: #7f1d1d;
        --bg-warning-hover: #78350f;

        --text-heading: #f1f5f9;
        --text-primary: #e2e8f0;
        --text-body: #cbd5e1;
        --text-secondary: #94a3b8;
        --text-tertiary: #64748b;
        --text-disabled: #475569;
        --text-inverse: #0f172a;

        --border-primary: #334155;
        --border-secondary: #1e293b;
        --border-focus: #60a5fa;

        --brand: #3b82f6;
        --brand-hover: #60a5fa;
        --brand-light: #1e3a5f;
        --brand-light-2: #1e3a5f;
        --brand-border: #1e40af;

        --color-success: #4ade80;
        --color-warning: #fbbf24;
        --color-danger: #f87171;
        --color-purple: #a78bfa;
        --color-orange: #fb923c;
        --color-amber: #fbbf24;
        --color-info: #38bdf8;

        --bg-info: #0c2744;
        --bg-purple: #2e1065;
        --bg-purple-hover: #3b0764;
        --bg-success-border: #166534;
        --bg-warning-border: #78350f;
        --bg-danger-border: #7f1d1d;
      }
      [data-theme="dark"] body {
        background: #0f172a;
        color: #e2e8f0;
      }
      [data-theme="dark"] input,
      [data-theme="dark"] textarea,
      [data-theme="dark"] select {
        background: #334155 !important;
        color: #e2e8f0 !important;
        border-color: #475569 !important;
      }
      [data-theme="dark"] input::placeholder,
      [data-theme="dark"] textarea::placeholder {
        color: #64748b !important;
      }
      /* 暗色模式全局覆盖 - 覆盖 inline styles 中的硬编码颜色 */
      [data-theme="dark"] * {
        border-color: #334155 !important;
      }
      [data-theme="dark"] table,
      [data-theme="dark"] th,
      [data-theme="dark"] td {
        border-color: #334155 !important;
      }
      [data-theme="dark"] th {
        background: #1e293b !important;
        color: #94a3b8 !important;
      }
      [data-theme="dark"] tr {
        border-color: #1e293b !important;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      [style*="scrollbar-width: none"]::-webkit-scrollbar,
      [style*="scrollbar-width:none"]::-webkit-scrollbar { display: none; width: 0; height: 0; }
      /* 导航按钮 hover 效果 */
      .nav-link { transition: all 0.15s ease; }
      .nav-link:hover {
        background: var(--bg-hover) !important;
        color: var(--brand) !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        transform: translateY(-1px);
      }
      .nav-link.active:hover {
        box-shadow: 0 2px 8px rgba(37,99,235,0.15);
      }
      /* 全局可交互元素 hover 效果 */
      button:not(.nav-link) {
        transition: all 0.15s ease;
      }
      button:not(.nav-link):hover {
        filter: brightness(1.08);
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      }
      a:not(.nav-link) {
        transition: all 0.15s ease;
      }
      a:not(.nav-link):hover {
        filter: brightness(1.08);
      }
      /* 带 cursor:pointer 的元素 (React inline style -> DOM attribute) */
      [style*="cursor: pointer"], [style*="cursor:pointer"] {
        transition: filter 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      }
      [style*="cursor: pointer"]:hover, [style*="cursor:pointer"]:hover {
        filter: brightness(1.06);
      }
      /* 表格行 hover */
      tr:hover {
        background: var(--bg-hover) !important;
        transition: background 0.15s ease;
      }
      thead tr:hover {
        background: inherit !important;
      }
      html, body, #root {
        height: 100%;
        max-height: 100%;
        overflow: hidden;
      }
      body {
        font-family: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        -webkit-overflow-scrolling: touch;
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right);
      }
      #root { display: flex; flex-direction: column; min-height: 0; }
      input, textarea, select, button { font-size: 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes skeleton-pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
      @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
      /* Sheet side panel */
      .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; animation: fadeInOverlay 0.15s ease; }
      .sheet-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 92vw; background: var(--bg-primary); box-shadow: -8px 0 30px rgba(0,0,0,0.12); z-index: 1001; animation: slideInRight 0.2s ease; overflow-y: auto; }
      /* Dropdown menu items */
      .dropdown-item { width: 100%; padding: 8px 14px; border: none; background: none; cursor: pointer; display: flex; align-items: center; gap: 8; font-size: 13px; white-space: nowrap; border-radius: 4px; margin: 0 4px; transition: background 0.1s; }
      .dropdown-item:hover { background: var(--bg-hover) !important; filter: none !important; box-shadow: none !important; }
      .dropdown-item.danger { color: var(--color-danger); }
      .dropdown-item.danger:hover { background: var(--bg-danger) !important; }
      .dropdown-item.success { color: var(--color-success); }
      .dropdown-item.success:hover { background: var(--bg-success) !important; }
      .dropdown-item.warning { color: var(--color-warning); }
      .dropdown-item.warning:hover { background: var(--bg-warning) !important; }
      @media print {
        body { background: #fff !important; }
        nav, aside, .no-print, [data-sidebar] { display: none !important; }
        main, [data-main] { margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!refreshing) { refreshing = true; window.location.reload(); }
        });
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(reg) {
            reg.addEventListener('updatefound', function() {
              var w = reg.installing;
              if (w) w.addEventListener('statechange', function() {
                if (w.state === 'installed' && navigator.serviceWorker.controller) {
                  window.__swWaiting = w;
                  window.dispatchEvent(new Event('sw-update-available'));
                }
              });
            });
            if (reg.waiting) {
              window.__swWaiting = reg.waiting;
              window.dispatchEvent(new Event('sw-update-available'));
            }
            reg.update();
            setInterval(function() { reg.update(); }, 60000);
          }).catch(function(){});
        });
      }
    </script>
  </body>
</html>
