<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuiJie 企业管理 - UI 重新设计</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-card-hover: #1e2233;
    --bg-subtle: #252836;
    --border: #2a2d3a;
    --brand: #4f6ef7;
    --brand-soft: rgba(79,110,247,0.12);
    --brand-hover: #6381f8;
    --text-primary: #e8eaed;
    --text-secondary: #8b8fa3;
    --text-tertiary: #5f6375;
    --green: #34d399;
    --green-bg: rgba(52,211,153,0.1);
    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.1);
    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; }

  /* 侧边栏 */
  .sidebar { width: 220px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 0 20px 24px; font-size: 22px; font-weight: 800; color: var(--brand); letter-spacing: -0.5px; }
  .sidebar-section { padding: 0 12px; margin-bottom: 16px; }
  .sidebar-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 6px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 13.5px; cursor: pointer; transition: all .15s; }
  .sidebar-item:hover { background: var(--bg-subtle); color: var(--text-primary); }
  .sidebar-item.active { background: var(--brand-soft); color: var(--brand); font-weight: 600; }
  .sidebar-item svg { width: 18px; height: 18px; opacity: 0.7; }
  .sidebar-item.active svg { opacity: 1; }

  /* 主区域 */
  .main { flex: 1; padding: 28px 36px; overflow-y: auto; }

  /* 页头 */
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
  .page-header p { color: var(--text-secondary); font-size: 14px; }

  /* Tab 导航 */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg-card); border-radius: 12px; padding: 4px; border: 1px solid var(--border); width: fit-content; }
  .tab { padding: 8px 18px; border-radius: 8px; font-size: 13.5px; color: var(--text-secondary); cursor: pointer; transition: all .15s; font-weight: 500; }
  .tab:hover { color: var(--text-primary); }
  .tab.active { background: var(--brand); color: #fff; font-weight: 600; }
  .tab .count { display: inline-block; background: rgba(255,255,255,0.15); padding: 1px 7px; border-radius: 6px; font-size: 11px; margin-left: 4px; }
  .tab.active .count { background: rgba(255,255,255,0.25); }

  /* 企业卡片 - 重新设计 */
  .enterprise-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; transition: all .2s; }
  .enterprise-card:hover { border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand), 0 4px 20px rgba(79,110,247,0.08); }
  .ent-top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px; }
  .ent-avatar { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, var(--brand), #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .ent-info { flex: 1; }
  .ent-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .ent-name { font-size: 20px; font-weight: 700; }
  .ent-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .tag-type { background: var(--purple-bg); color: var(--purple); }
  .tag-industry { background: var(--green-bg); color: var(--green); }
  .tag-scale { background: var(--amber-bg); color: var(--amber); }
  .tag-role { background: var(--brand-soft); color: var(--brand); font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .ent-meta { color: var(--text-secondary); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; }
  .ent-meta span { display: flex; align-items: center; gap: 4px; }
  .ent-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .btn-icon:hover { background: var(--bg-subtle); color: var(--text-primary); border-color: var(--text-tertiary); }

  /* 推荐码条 */
  .invite-bar { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--bg-subtle); border-radius: 12px; margin-bottom: 24px; }
  .invite-bar .icon { width: 36px; height: 36px; border-radius: 10px; background: var(--brand-soft); display: flex; align-items: center; justify-content: center; color: var(--brand); flex-shrink: 0; }
  .invite-bar .info { flex: 1; }
  .invite-bar .label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .invite-bar .desc { font-size: 12px; color: var(--text-secondary); }
  .invite-code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 15px; font-weight: 600; padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; letter-spacing: 1px; color: var(--text-primary); }
  .btn-sm { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer; font-weight: 500; transition: all .15s; }
  .btn-sm:hover { background: var(--bg-subtle); color: var(--text-primary); }
  .btn-primary-sm { padding: 7px 14px; border-radius: 8px; border: none; background: var(--brand); color: #fff; font-size: 12px; cursor: pointer; font-weight: 600; transition: all .15s; }
  .btn-primary-sm:hover { background: var(--brand-hover); }

  /* 成员网格 - 重新设计  */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .section-count { font-size: 12px; color: var(--text-tertiary); background: var(--bg-subtle); padding: 2px 8px; border-radius: 6px; }
  .btn-add { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); border: 1px dashed var(--border); background: transparent; color: var(--brand); font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s; }
  .btn-add:hover { border-color: var(--brand); background: var(--brand-soft); }

  .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .member-card { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--bg-subtle); border-radius: 12px; border: 1px solid transparent; transition: all .15s; cursor: pointer; }
  .member-card:hover { border-color: var(--border); background: var(--bg-card-hover); }
  .member-avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .avatar-creator { background: linear-gradient(135deg, var(--brand), #8b5cf6); }
  .avatar-member { background: linear-gradient(135deg, #f87171, #fb923c); }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .member-role { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .role-creator { background: var(--purple-bg); color: var(--purple); }
  .role-pending { background: var(--amber-bg); color: var(--amber); }
  .member-phone { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }
  .member-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .member-card:hover .member-actions { opacity: 1; }
  .btn-xs { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .btn-xs:hover { background: var(--bg-card); color: var(--text-primary); }
  .btn-xs.danger:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* 时间标注 */
  .created-at { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; margin-top: 16px; }

  /* 设计标注框 */
  .design-note { position: fixed; bottom: 20px; right: 20px; background: var(--brand); color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 20px rgba(79,110,247,0.3); z-index: 100; }
</style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
  <div class="sidebar-logo">DuiJie</div>
  <div class="sidebar-section">
    <div class="sidebar-label">工作台</div>
    <div class="sidebar-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

    </div>
    <div class="sidebar-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>

<!-- 主内容 -->
<div class="main">
  <div class="page-header">
    <h1>企业管理</h1>
    <p>管理企业信息、部门与组织成员</p>
  </div>

  <!-- Tab 导航 - 胶囊式 -->
  <div class="tabs">
