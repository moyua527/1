name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pw
          MYSQL_DATABASE: duijie_db
          MYSQL_USER: duijie
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/duijie/package-lock.json

      - name: Install dependencies
        working-directory: server/duijie
        run: npm ci

      - name: Run migrations
        working-directory: server/duijie
        env:
          DB_HOST: 127.0.0.1
          DB_USER: duijie
          DB_PASSWORD: test_password
          DB_NAME: duijie_db
          JWT_SECRET: ci_test_secret_key_do_not_use_in_production
        run: npm run migrate

      - name: Run tests
        working-directory: server/duijie
        env:
          DB_HOST: 127.0.0.1
          DB_USER: duijie
          DB_PASSWORD: test_password
          DB_NAME: duijie_db
          JWT_SECRET: ci_test_secret_key_do_not_use_in_production
          NODE_ENV: test
        run: npm test
