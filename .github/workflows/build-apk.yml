name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend/duijieReact
        run: npm install

      - name: Build web
        working-directory: frontend/duijieReact
        run: npx vite build

      - name: Sync Capacitor
        working-directory: frontend/duijieReact
        run: npx cap sync android

      - name: Build APK
        working-directory: frontend/duijieReact/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuiJie-debug
          path: frontend/duijieReact/android/app/build/outputs/apk/debug/app-debug.apk
