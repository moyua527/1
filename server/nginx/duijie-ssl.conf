# === 限速区域定义（放在 server 块外部由部署脚本写入 nginx.conf http 块） ===
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# --- HTTP → HTTPS 重定向 ---
server {
    listen 80;
    listen 8080;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS 主配置 ---
server {
    listen 443 ssl http2;
    server_name your-domain.com;
    root /opt/duijie/frontend/duijieReact/dist;
    index index.html;

    # --- SSL 证书（Let's Encrypt） ---
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # --- SSL 安全配置 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- HSTS（启用后浏览器会强制使用 HTTPS） ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- 安全基础 ---
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- 连接限制 ---
    limit_conn conn_limit 30;

    # --- 封禁常见攻击路径 ---
    location ~* (\.env|\.git|\.svn|\.htaccess|\.DS_Store|wp-admin|wp-login|phpmyadmin|xmlrpc|cgi-bin) {
        return 444;
    }

    # --- 封禁恶意爬虫 User-Agent ---
    if ($http_user_agent ~* (scrapy|curl|wget|python-requests|java|httpclient|libwww|nikto|sqlmap|nmap|masscan|zgrab|semrush|ahref|mj12bot|dotbot|petalbot)) {
        return 403;
    }

    # --- 静态资源（长缓存） ---
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- 前端路由 ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # --- API 代理（带限速） ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:1800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时保护
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- 登录接口严格限速 ---
    location = /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:1800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket ---
    location /socket.io/ {
        proxy_pass http://127.0.0.1:1800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 文件上传代理 ---
    location /uploads/ {
        proxy_pass http://127.0.0.1:1800;
    }

    # --- Let's Encrypt ACME 验证 ---
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 50M;
}
