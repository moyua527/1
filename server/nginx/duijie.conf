# === 限速区域定义（放在 server 块外部由部署脚本写入 nginx.conf http 块） ===
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 8080;
    server_name _;
    root /opt/duijie/frontend/duijieReact/dist;
    index index.html;

    # --- 安全基础 ---
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Gzip 压缩 ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/rss+xml image/svg+xml;

    # --- 连接限制 ---
    limit_conn conn_limit 30;

    # --- 封禁常见攻击路径 ---
    location ~* (\.env|\.git|\.svn|\.htaccess|\.DS_Store|wp-admin|wp-login|phpmyadmin|xmlrpc|cgi-bin) {
        return 444;
    }

    # --- 封禁恶意爬虫 User-Agent ---
    if ($http_user_agent ~* (scrapy|curl|wget|python-requests|java|httpclient|libwww|nikto|sqlmap|nmap|masscan|zgrab|semrush|ahref|mj12bot|dotbot|petalbot)) {
        return 403;
    }

    # --- 静态资源（长缓存） ---
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- 前端路由 ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # --- API 代理（带限速） ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:1800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # 超时保护
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- 登录接口严格限速 ---
    location = /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:1800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- SSE (Server-Sent Events) ---
    location = /api/sse {
        proxy_pass http://127.0.0.1:1800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # --- WebSocket ---
    location /socket.io/ {
        proxy_pass http://127.0.0.1:1800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- 文件上传代理（带缓存） ---
    location /uploads/ {
        proxy_pass http://127.0.0.1:1800;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- APK / Bundle 下载 ---
    location /downloads/ {
        alias /opt/duijie/downloads/;
        types {
            application/vnd.android.package-archive apk;
            application/zip zip;
        }
        default_type application/octet-stream;
        add_header Cache-Control "no-cache" always;
    }

    client_max_body_size 50M;
}
